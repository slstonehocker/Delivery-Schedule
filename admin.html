<!DOCTYPE html>
<html lang="en">
<head>
  <title>Admin – Delivery Calendar</title>
  <style>
    :root {
      --maroon: #811419;
      --maroon-dark: #5e0f13;
      --maroon-light: #f9eaea;
      --white: #ffffff;
      --light-gray: #f5f5f5;
      --border: #dddddd;
      --warning: #b45309;
      --warning-bg: #fef3c7;
      --danger: #991b1b;
      --danger-bg: #fee2e2;
      --success: #166534;
      --success-bg: #dcfce7;
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: Arial, sans-serif;
      background: var(--light-gray);
      min-height: 100vh;
    }
 
    /* ── Header ── */
    .header {
      background: var(--maroon);
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .header h1 { font-size: 20px; letter-spacing: .5px; }
    .header .badge {
      background: white;
      color: var(--maroon);
      font-size: 11px;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .back-link {
      color: rgba(255,255,255,.8);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .15s;
    }
    .back-link:hover { color: white; }
 
    /* ── Layout ── */
    .page {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
      align-items: start;
    }
 
    /* ── Cards ── */
    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .card-header {
      background: var(--maroon);
      color: white;
      padding: 14px 20px;
      font-weight: bold;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-body { padding: 20px; }
 
    /* ── Block Day Panel ── */
    .block-section { margin-bottom: 24px; }
    .block-section label {
      display: block;
      font-weight: bold;
      color: #333;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .block-section input[type="date"],
    .block-section textarea,
    .block-section select {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }
    .block-section input[type="date"]:focus,
    .block-section textarea:focus,
    .block-section select:focus {
      outline: none;
      border-color: var(--maroon);
    }
    .block-section textarea { height: 70px; resize: vertical; }
 
    .reason-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .pill {
      padding: 5px 12px;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      font-size: 13px;
      cursor: pointer;
      background: white;
      color: #555;
      transition: all .15s;
      user-select: none;
    }
    .pill:hover { border-color: var(--maroon); color: var(--maroon); }
    .pill.active {
      background: var(--maroon);
      border-color: var(--maroon);
      color: white;
    }
 
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-maroon { background: var(--maroon); color: white; }
    .btn-outline {
      background: white;
      color: var(--maroon);
      border: 1.5px solid var(--maroon);
    }
 
    /* ── Blocked Days List ── */
    .blocked-list { display: flex; flex-direction: column; gap: 10px; }
    .blocked-item {
      border: 1px solid var(--border);
      border-left: 4px solid var(--danger);
      border-radius: 6px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      background: #fff;
    }
    .blocked-item .info .date-label {
      font-weight: bold;
      color: #111;
      font-size: 14px;
    }
    .blocked-item .info .reason-tag {
      display: inline-block;
      margin-top: 4px;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--danger-bg);
      color: var(--danger);
      font-weight: bold;
    }
    .blocked-item .info .note {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    .unblock-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      color: #555;
      white-space: nowrap;
      transition: all .15s;
      flex-shrink: 0;
    }
    .unblock-btn:hover { border-color: var(--maroon); color: var(--maroon); }
 
    .empty-state {
      text-align: center;
      color: #999;
      font-style: italic;
      padding: 20px 0;
      font-size: 14px;
    }
 
    /* ── Right column: delivery management ── */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }
    .week-nav button {
      background: none;
      border: 1.5px solid var(--maroon);
      color: var(--maroon);
      padding: 5px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: all .15s;
    }
    .week-nav button:hover { background: var(--maroon); color: white; }
    .week-nav .week-label { font-weight: bold; color: var(--maroon); font-size: 15px; }
 
    .delivery-grid {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
 
    /* Day block */
    .day-block {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .day-block.day-blocked {
      border-color: var(--danger);
      opacity: .85;
    }
    .day-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--maroon-light);
      font-weight: bold;
      font-size: 14px;
      color: var(--maroon);
    }
    .day-title.blocked-title {
      background: var(--danger-bg);
      color: var(--danger);
    }
    .day-title .blocked-badge {
      font-size: 11px;
      background: var(--danger);
      color: white;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: bold;
      letter-spacing: .5px;
    }
 
    /* Delivery rows */
    .delivery-row {
      display: grid;
      grid-template-columns: 70px 1fr 130px 180px;
      align-items: center;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      gap: 10px;
      font-size: 13px;
    }
    .delivery-row:hover { background: #fafafa; }
    .delivery-row[draggable="true"] { cursor: grab; }
    .delivery-row.drag-over { background: #fef3c7; outline: 2px dashed var(--maroon); }
    .slot-label { font-weight: bold; color: #555; }
    .delivery-info .order { font-weight: bold; color: #111; }
    .delivery-info .sub { color: #777; font-size: 12px; margin-top: 1px; }
    .status-badge {
      font-size: 11px;
      font-weight: bold;
      padding: 3px 9px;
      border-radius: 99px;
      text-align: center;
    }
    .status-pending { background: var(--maroon); color: white; }
    .status-approved { background: var(--success-bg); color: var(--success); }
    .approve-btn {
      background: none;
      border: 1px solid var(--success);
      border-radius: 5px;
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      color: var(--success);
      transition: all .15s;
      font-weight: bold;
    }
    .approve-btn:hover { background: var(--success-bg); }
    .reject-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      color: #555;
      transition: all .15s;
    }
    .reject-btn:hover { border-color: var(--danger); color: var(--danger); }
    .remove-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      color: #555;
      transition: all .15s;
    }
    .remove-btn:hover { border-color: #991b1b; color: #991b1b; background: #fee2e2; }
    .action-btns { display: flex; gap: 5px; align-items: center; }
    .status-cancelled { background: var(--danger-bg); color: var(--danger); }
    .status-empty { background: #eee; color: #888; }
 
    .cancel-slot-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      color: #555;
      transition: all .15s;
    }
    .cancel-slot-btn:hover { border-color: var(--danger); color: var(--danger); }
    .cancel-slot-btn.restore {
      border-color: var(--success);
      color: var(--success);
    }
    .cancel-slot-btn.restore:hover { background: var(--success-bg); }
    .empty-slot { color: #bbb; font-style: italic; }
 
    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1a1a1a;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      opacity: 0;
      transform: translateY(10px);
      transition: all .25s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
 
    /* ── Confirm modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: white;
      border-radius: 10px;
      border-top: 5px solid var(--danger);
      padding: 28px;
      width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
    }
    .modal-box h3 { color: var(--danger); margin-bottom: 10px; }
    .modal-box p { color: #444; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; border: none; }
    .modal-confirm { background: var(--danger); color: white; }
    .modal-cancel-btn { background: #eee; color: #333; }
  </style>
</head>
<body>
 
<div class="header">
  <a class="back-link" href="index.html">Back to Calendar</a>
  <h1>Admin Panel</h1>
  <span class="badge">Admin Only</span>
</div>
 
<div class="page">
 
  <!-- LEFT: Block a day -->
  <div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">Block a Day</div>
      <div class="card-body">
        <div class="block-section">
          <label>Date to Block</label>
          <input type="date" id="blockDate">
        </div>
        <div class="block-section">
          <label>Reason</label>
          <div class="reason-pills" id="reasonPills">
            <span class="pill active" data-reason="Weather">Weather</span>
            <span class="pill" data-reason="Holiday">Holiday</span>
            <span class="pill" data-reason="Staff Shortage">Staff Shortage</span>
            <span class="pill" data-reason="Barbeque">Barbeque </span>
            <span class="pill" data-reason="other">Other</span>
          </div>
        </div>
        <div class="block-section">
          <label>Note (optional)</label>
          <textarea id="blockNote" placeholder="e.g. Blizzard warning — all deliveries suspended"></textarea>
        </div>
        <button class="btn btn-danger" onclick="blockDay()">Block This Day</button>
      </div>
    </div>
 
    <!-- Blocked days list -->
    <div class="card">
      <div class="card-header">Blocked Days</div>
      <div class="card-body">
        <div class="blocked-list" id="blockedList"></div>
      </div>
    </div>

    <!-- Removed/Rejected deliveries -->
    <div class="card" style="margin-top:20px">
      <div class="card-header">Removed / Rejected Deliveries</div>
      <div class="card-body">
        <div class="blocked-list" id="removedList"></div>
      </div>
    </div>
  </div>
 
  <!-- RIGHT: Weekly delivery management -->
  <div class="card">
    <div class="card-header">Manage Deliveries</div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">Prev</button>
      <span class="week-label" id="weekLabel"></span>
      <button onclick="changeWeek(1)">Next</button>
    </div>
    <div class="delivery-grid" id="deliveryGrid"></div>
  </div>
 
</div>
 
<!-- Confirm modal -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal-box">
    <h3 id="modalTitle">Confirm Action</h3>
    <p id="modalMessage"></p>
    <div class="modal-btns">
      <button class="modal-cancel-btn" onclick="closeModal()">Go Back</button>
      <button class="modal-confirm" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>

<!-- Delivery details modal -->
<div class="modal-overlay hidden" id="detailsModal">
  <div class="modal-box">
    <h3>Delivery Details</h3>
    <div id="detailsContent"></div>
    <div class="modal-btns">
      <button class="modal-cancel-btn" onclick="closeDetailsModal()">Close</button>
    </div>
  </div>
</div>
 
<!-- Toast -->
<div class="toast" id="toast"></div>
 
<script>
  // ── Shared storage keys (same localStorage as main calendar) ──
  const DELIVERIES_KEY = "deliveries";
  const BLOCKED_KEY    = "blockedDays";
  const CANCELLED_KEY  = "cancelledSlots";
  const APPROVED_KEY   = "approvedSlots";
  const REMOVED_KEY    = "removedDeliveries";

  let deliveries     = JSON.parse(localStorage.getItem(DELIVERIES_KEY))  || {};
  let blockedDays    = JSON.parse(localStorage.getItem(BLOCKED_KEY))     || {};
  let cancelledSlots = JSON.parse(localStorage.getItem(CANCELLED_KEY))   || {};
  let approvedSlots  = JSON.parse(localStorage.getItem(APPROVED_KEY))    || {};
  let removedDeliveries = JSON.parse(localStorage.getItem(REMOVED_KEY))  || {};
 
  let currentMonday = getMonday(new Date());
  let selectedReason = "Weather";
  let pendingAction  = null;
 
  // ── Pill selection ──
  document.querySelectorAll(".pill").forEach(p => {
    p.addEventListener("click", () => {
      document.querySelectorAll(".pill").forEach(x => x.classList.remove("active"));
      p.classList.add("active");
      selectedReason = p.dataset.reason;
    });
  });
 
  // ── Block a day ──
  function blockDay() {
    const date = document.getElementById("blockDate").value;
    if (!date) { showToast(" Please pick a date first."); return; }
 
    const note = document.getElementById("blockNote").value.trim();
 
    showConfirm(
      "Block This Day?",
      `Block <strong>${formatDisplay(date)}</strong> for reason: <strong>${selectedReason}</strong>?
       ${note ? `<br><br>Note: "${note}"` : ""}
       <br><br>Existing deliveries on this day will be marked cancelled.`,
      () => {
        blockedDays[date] = { reason: selectedReason, note };
        save();
        document.getElementById("blockDate").value = "";
        document.getElementById("blockNote").value = "";
        render();
        showToast(` ${formatDisplay(date)} blocked — ${selectedReason}`);
      }
    );
  }
 
  // ── Approve a slot ──
  function approveSlot(key, orderNum) {
    showConfirm(
      "Approve Delivery?",
      `Approve delivery <strong>${orderNum || key}</strong>? The status will update to Approved.`,
      () => {
        // Re-read deliveries fresh from localStorage
        deliveries = JSON.parse(localStorage.getItem("deliveries")) || {};

        approvedSlots[key] = true;
        delete cancelledSlots[key];
        save();
        render();
        showToast("Delivery approved.");

        // Send confirmation email to salesperson
        const delivery = deliveries[key];
        if (delivery && delivery.salespersonEmail) {
          const dateKey = key.split("-slot-")[0];
          const slot    = key.split("-slot-")[1];
          const [y, m, d] = dateKey.split("-").map(Number);
          const displayDate = new Date(y, m - 1, d).toLocaleDateString("en-US", {
            weekday: "long", month: "long", day: "numeric", year: "numeric"
          });

          emailjs.send(
            "service_7alcqe6",
            "template_b71mbas",
            {
              salespersonName:  delivery.salespersonName  || "Salesperson",
              salespersonEmail: delivery.salespersonEmail,
              message:          "Great news! Your delivery request has been approved.",
              orderNumber:      delivery.orderNumber      || "—",
              dateKey:          displayDate,
              slot:             slot,
              onsiteContact:    delivery.onsiteContact    || "—",
              phoneNumber:      delivery.phoneNumber      || "—",
              preferredTime:    delivery.preferredTime    || "—",
              address:          delivery.address          || "—",
              deliveryNotes:    delivery.deliveryNotes    || "—"
            }
          ).then(() => {
            showToast("Confirmation email sent to " + delivery.salespersonName + ".");
          }).catch(err => {
            console.warn("Failed to send confirmation email:", err);
            showToast("Approved but confirmation email failed to send.");
          });
        }
      }
    );
  }

  // ── Reject a slot ──
  function rejectSlot(key, orderNum) {
    showConfirm(
      "Reject Delivery?",
      `Reject delivery <strong>${orderNum || key}</strong>? The slot will be marked cancelled.`,
      () => {
        deliveries = JSON.parse(localStorage.getItem("deliveries")) || {};
        const delivery = deliveries[key];

        // Remove delivery from calendar entirely
        delete deliveries[key];
        delete cancelledSlots[key];
        delete approvedSlots[key];
        if (delivery) {
          removedDeliveries[key] = { delivery, reason: "Rejected" };
          localStorage.setItem(REMOVED_KEY, JSON.stringify(removedDeliveries));
        }
        localStorage.setItem("deliveries", JSON.stringify(deliveries));
        save();
        render();
        showToast("Delivery rejected and removed.");

        // Send rejection email to salesperson
        if (delivery && delivery.salespersonEmail) {
          const dateKey = key.split("-slot-")[0];
          const slot    = key.split("-slot-")[1];
          const [y, m, d] = dateKey.split("-").map(Number);
          const displayDate = new Date(y, m - 1, d).toLocaleDateString("en-US", {
            weekday: "long", month: "long", day: "numeric", year: "numeric"
          });

          emailjs.send(
            "service_7alcqe6",
            "template_b71mbas",
            {
              salespersonName:  delivery.salespersonName  || "Salesperson",
              salespersonEmail: delivery.salespersonEmail,
              message:          "Unfortunately your delivery request has been rejected. Please contact your manager for more information.",
              orderNumber:      delivery.orderNumber      || "—",
              dateKey:          displayDate,
              slot:             slot,
              onsiteContact:    delivery.onsiteContact    || "—",
              phoneNumber:      delivery.phoneNumber      || "—",
              preferredTime:    delivery.preferredTime    || "—",
              address:          delivery.address          || "—",
              deliveryNotes:    delivery.deliveryNotes    || "—"
            }
          ).then(() => {
            showToast("Rejection email sent to " + delivery.salespersonName + ".");
          }).catch(err => {
            console.warn("Failed to send rejection email:", err);
          });
        }
      }
    );
  }

  // ── Remove a slot entirely ──
  function removeSlot(key, orderNum) {
    showConfirm(
      "Remove Delivery?",
      `Permanently remove delivery <strong>${orderNum || key}</strong>? This cannot be undone.`,
      () => {
        deliveries = JSON.parse(localStorage.getItem("deliveries")) || {};
        const delivery = deliveries[key];

        delete deliveries[key];
        delete cancelledSlots[key];
        delete approvedSlots[key];
        if (delivery) {
          removedDeliveries[key] = { delivery, reason: "Removed" };
          localStorage.setItem(REMOVED_KEY, JSON.stringify(removedDeliveries));
        }
        localStorage.setItem("deliveries", JSON.stringify(deliveries));
        save();
        render();
        showToast("Delivery removed.");

        // Send removal email to salesperson
        if (delivery && delivery.salespersonEmail) {
          const dateKey = key.split("-slot-")[0];
          const slot    = key.split("-slot-")[1];
          const [y, m, d] = dateKey.split("-").map(Number);
          const displayDate = new Date(y, m - 1, d).toLocaleDateString("en-US", {
            weekday: "long", month: "long", day: "numeric", year: "numeric"
          });

          emailjs.send(
            "service_7alcqe6",
            "template_b71mbas",
            {
              salespersonName:  delivery.salespersonName  || "Salesperson",
              salespersonEmail: delivery.salespersonEmail,
              message:          "Your delivery has been removed by the manager. Please contact your manager for more information.",
              orderNumber:      delivery.orderNumber      || "—",
              dateKey:          displayDate,
              slot:             slot,
              onsiteContact:    delivery.onsiteContact    || "—",
              phoneNumber:      delivery.phoneNumber      || "—",
              preferredTime:    delivery.preferredTime    || "—",
              address:          delivery.address          || "—",
              deliveryNotes:    delivery.deliveryNotes    || "—"
            }
          ).then(() => {
            showToast("Removal email sent to " + delivery.salespersonName + ".");
          }).catch(err => console.warn("Failed to send removal email:", err));
        }
      }
    );
  }

  // ── Cancel / restore a single slot ──
  function toggleCancelSlot(key, orderNum) {
    if (cancelledSlots[key]) {
      // Restore
      showConfirm(
        "Restore Delivery?",
        `Restore delivery <strong>${orderNum || key}</strong> to Pending Approval?`,
        () => {
          delete cancelledSlots[key];
          save();
          render();
          showToast(" Delivery restored.");
        }
      );
    } else {
      // Cancel
      showConfirm(
        "Cancel Delivery?",
        `Cancel delivery <strong>${orderNum || key}</strong>? The slot will be marked cancelled.`,
        () => {
          cancelledSlots[key] = true;
          save();
          render();
          showToast(" Delivery cancelled.");
        }
      );
    }
  }
 
    // ── Restore a removed/rejected delivery back to the calendar ──
  function restoreRemovedDelivery(key) {
    const entry = removedDeliveries[key];
    if (!entry) return;

    deliveries = JSON.parse(localStorage.getItem("deliveries")) || {};

    if (deliveries[key]) {
      showToast("That slot is now occupied — can't add back.");
      return;
    }

    showConfirm(
      "Add Back to Calendar?",
      `Restore <strong>Order #${entry.delivery.orderNumber || "—"}</strong> to its original slot as a pending delivery?`,
      () => {
        deliveries[key] = entry.delivery;
        delete cancelledSlots[key];
        delete approvedSlots[key];
        delete removedDeliveries[key];

        localStorage.setItem("deliveries", JSON.stringify(deliveries));
        localStorage.setItem(REMOVED_KEY, JSON.stringify(removedDeliveries));
        save();
        render();
        showToast("Delivery added back to calendar.");
      }
    );
  }
  
  
  // ── Unblock a day ──
  function unblockDay(date) {
    showConfirm(
      "Unblock This Day?",
      `Remove the block on <strong>${formatDisplay(date)}</strong>? Deliveries will return to Pending Approval.`,
      () => {
        delete blockedDays[date];
        save();
        render();
        showToast(` ${formatDisplay(date)} unblocked.`);
      }
    );
  }
 
  // ── Render ──
  function render() {
    renderBlockedList();
    renderRemovedList();
    renderDeliveryGrid();
  }

  function renderRemovedList() {
    const list  = document.getElementById("removedList");
    const today = fmt(new Date());

    // Drop entries whose delivery date has passed
    let changed = false;
    Object.keys(removedDeliveries).forEach(key => {
      const dateKey = key.split("-slot-")[0];
      if (dateKey < today) {
        delete removedDeliveries[key];
        changed = true;
      }
    });
    if (changed) localStorage.setItem(REMOVED_KEY, JSON.stringify(removedDeliveries));

    const keys = Object.keys(removedDeliveries).sort();
    if (!keys.length) {
      list.innerHTML = `<div class="empty-state">No removed or rejected deliveries.</div>`;
      return;
    }

        list.innerHTML = keys.map(key => {
      const { delivery, reason } = removedDeliveries[key];
      const dateKey = key.split("-slot-")[0];
      const slot    = key.split("-slot-")[1];
      return `
        <div class="blocked-item">
          <div class="info">
            <div class="date-label">${formatDisplay(dateKey)} — Slot ${slot}</div>
            <span class="reason-tag">${reason}</span>
            <div class="note">Order #${delivery.orderNumber || "—"} · ${delivery.salespersonName || "—"}</div>
          </div>
          <button class="unblock-btn" onclick='restoreRemovedDelivery("${key}")'>Add Back</button>
        </div>`;
    }).join("");
  }
 
  function renderBlockedList() {
    const list = document.getElementById("blockedList");
    const keys = Object.keys(blockedDays).sort();
    if (!keys.length) {
      list.innerHTML = `<div class="empty-state">No days blocked yet.</div>`;
      return;
    }
    list.innerHTML = keys.map(date => {
      const { reason, note } = blockedDays[date];
      return `
        <div class="blocked-item">
          <div class="info">
            <div class="date-label">${formatDisplay(date)}</div>
            <span class="reason-tag">${reason}</span>
            ${note ? `<div class="note">${note}</div>` : ""}
          </div>
          <button class="unblock-btn" onclick="unblockDay('${date}')">Unblock</button>
        </div>`;
    }).join("");
  }
 
  function renderDeliveryGrid() {
    const grid    = document.getElementById("deliveryGrid");
    const dayNames= ["Monday","Tuesday","Wednesday","Thursday","Friday"];
    document.getElementById("weekLabel").textContent =
      `${formatDisplay(fmt(currentMonday))} – ${formatDisplay(fmt(addDays(currentMonday,4)))}`;
 
    grid.innerHTML = dayNames.map((name, i) => {
      const date    = addDays(currentMonday, i);
      const dateKey = fmt(date);
      const isBlocked = !!blockedDays[dateKey];
 
      const slots = Array.from({length:5},(_,s)=>{
        const slot = s+1;
        const key  = `${dateKey}-slot-${slot}`;
        const d    = deliveries[key];
        const isCancelledByAdmin = !!cancelledSlots[key];
        const isCancelledByBlock = isBlocked && !!d;
        const isApproved         = !!approvedSlots[key];

        let statusHtml, actionHtml;
        if (!d) {
          statusHtml = `<span class="status-badge status-empty">Empty</span>`;
          actionHtml = `<span></span>`;
        } else if (isCancelledByAdmin) {
          statusHtml = `<span class="status-badge status-cancelled">Cancelled</span>`;
          actionHtml = `<div class="action-btns">
            <button class="cancel-slot-btn restore" onclick="toggleCancelSlot('${key}','${d.orderNumber||""}')">Restore</button>
            <button class="remove-btn" onclick="removeSlot('${key}','${d.orderNumber||""}')">Remove</button>
          </div>`;
        } else if (isCancelledByBlock) {
          statusHtml = `<span class="status-badge status-cancelled">Day Blocked</span>`;
          actionHtml = `<div class="action-btns"><button class="remove-btn" onclick="removeSlot('${key}','${d.orderNumber||""}')">Remove</button></div>`;
        } else if (isApproved) {
          statusHtml = `<span class="status-badge status-approved"> Approved</span>`;
          actionHtml = `<div class="action-btns">
            <button class="reject-btn" onclick="rejectSlot('${key}','${d.orderNumber||""}')">Reject</button>
            <button class="remove-btn" onclick="removeSlot('${key}','${d.orderNumber||""}')">Remove</button>
          </div>`;
        } else {
          statusHtml = `<span class="status-badge status-pending">Pending</span>`;
          actionHtml = `<div class="action-btns">
            <button class="approve-btn" onclick="approveSlot('${key}','${d.orderNumber||""}')">Approve</button>
            <button class="reject-btn" onclick="rejectSlot('${key}','${d.orderNumber||""}')">Reject</button>
            <button class="remove-btn" onclick="removeSlot('${key}','${d.orderNumber||""}')">Remove</button>
          </div>`;
        }
 
        return `
          <div class="delivery-row"
               data-key="${key}"
               draggable="${d ? "true" : "false"}"
               ondragstart="dragStart(event)"
               ondragover="dragOver(event)"
               ondragleave="dragLeave(event)"
               ondrop="dragDrop(event)"
               ondragend="dragEnd(event)">
            <span class="slot-label">Slot ${slot}</span>
            <div class="delivery-info" ${d ? `style="cursor:pointer;" onclick='showDeliveryDetails(${JSON.stringify(d)})'` : ""}>
              ${d
                ? `<div class="order">#${d.orderNumber||"—"}</div>
                   <div class="sub">${d.onsiteContact||""} ${d.preferredTime ? "· "+d.preferredTime : ""}</div>`
                : `<span class="empty-slot">No delivery</span>`}
            </div>
            ${statusHtml}
            ${actionHtml}
          </div>`;
      }).join("");
 
      return `
        <div class="day-block ${isBlocked?"day-blocked":""}">
          <div class="day-title ${isBlocked?"blocked-title":""}">
            <span>${name}, ${formatDisplay(dateKey)}</span>
            ${isBlocked
              ? `<span class="blocked-badge"> ${blockedDays[dateKey].reason}</span>`
              : ""}
          </div>
          ${slots}
        </div>`;
    }).join("");
  }
 
  // ── Drag and drop to move deliveries ──
  function dragStart(e) {
    const row = e.currentTarget;
    if (row.getAttribute("draggable") !== "true") {
      e.preventDefault();
      return;
    }
    e.dataTransfer.setData("text/plain", row.dataset.key);
    e.dataTransfer.effectAllowed = "move";
  }

  function dragOver(e) {
    e.preventDefault();
    e.currentTarget.classList.add("drag-over");
  }

  function dragLeave(e) {
    e.currentTarget.classList.remove("drag-over");
  }

  function dragEnd(e) {
    document.querySelectorAll(".delivery-row.drag-over").forEach(el => el.classList.remove("drag-over"));
  }

  function dragDrop(e) {
    e.preventDefault();
    const row = e.currentTarget;
    row.classList.remove("drag-over");

    const fromKey = e.dataTransfer.getData("text/plain");
    const toKey   = row.dataset.key;
    if (!fromKey || fromKey === toKey) return;

    const fromDelivery = deliveries[fromKey];
    if (!fromDelivery) return;

    if (deliveries[toKey] && !confirm("This slot already has a delivery. Swap them?")) return;

    const toDelivery       = deliveries[toKey];
    const fromCancelled    = cancelledSlots[fromKey];
    const fromApproved     = approvedSlots[fromKey];
    const toCancelled      = cancelledSlots[toKey];
    const toApproved       = approvedSlots[toKey];

    if (toDelivery) {
      deliveries[fromKey] = toDelivery;
    } else {
      delete deliveries[fromKey];
    }
    deliveries[toKey] = fromDelivery;

    if (fromCancelled) cancelledSlots[toKey] = true; else delete cancelledSlots[toKey];
    if (toCancelled)   cancelledSlots[fromKey] = true; else delete cancelledSlots[fromKey];
    if (fromApproved)  approvedSlots[toKey] = true; else delete approvedSlots[toKey];
    if (toApproved)    approvedSlots[fromKey] = true; else delete approvedSlots[fromKey];

    localStorage.setItem("deliveries", JSON.stringify(deliveries));
    localStorage.setItem(CANCELLED_KEY, JSON.stringify(cancelledSlots));
    localStorage.setItem(APPROVED_KEY,  JSON.stringify(approvedSlots));

    renderDeliveryGrid();
  }

  // ── Week nav ──
  function changeWeek(dir) {
    currentMonday = addDays(currentMonday, dir*7);
    renderDeliveryGrid();
  }
 
  // ── Delivery details modal ──
  function showDeliveryDetails(d) {
    document.getElementById("detailsContent").innerHTML = `
      <p><strong>Order #:</strong> ${d.orderNumber || "—"}</p>
      <p><strong>Salesperson:</strong> ${d.salespersonName || "—"}</p>
      <p><strong>Salesperson Email:</strong> ${d.salespersonEmail || "—"}</p>
      <p><strong>Onsite Contact:</strong> ${d.onsiteContact || "—"}</p>
      <p><strong>Phone Number:</strong> ${d.phoneNumber || "—"}</p>
      <p><strong>Preferred Time:</strong> ${d.preferredTime || "—"}</p>
      <p><strong>Address:</strong> ${d.address || "—"}</p>
      <p><strong>Delivery Notes:</strong> ${d.deliveryNotes || "—"}</p>
    `;
    document.getElementById("detailsModal").classList.remove("hidden");
  }
  function closeDetailsModal() {
    document.getElementById("detailsModal").classList.add("hidden");
  }

  // ── Confirm modal ──
  function showConfirm(title, msg, onConfirm) {
    document.getElementById("modalTitle").textContent  = title;
    document.getElementById("modalMessage").innerHTML  = msg;
    document.getElementById("confirmModal").classList.remove("hidden");
    pendingAction = onConfirm;
  }
  function closeModal() {
    document.getElementById("confirmModal").classList.add("hidden");
    pendingAction = null;
  }
  document.getElementById("modalConfirmBtn").addEventListener("click", () => {
    if (pendingAction) pendingAction();
    closeModal();
  });
 
  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }
 
  // ── Helpers ──
  function save() {
    localStorage.setItem(BLOCKED_KEY,    JSON.stringify(blockedDays));
    localStorage.setItem(CANCELLED_KEY,  JSON.stringify(cancelledSlots));
    localStorage.setItem(APPROVED_KEY,   JSON.stringify(approvedSlots));
  }
  function getMonday(d) {
    const day = d.getDay();
    const diff= d.getDate() - day + (day===0 ? -6 : 1);
    return new Date(new Date(d).setDate(diff));
  }
  function addDays(d, n) {
    const r = new Date(d);
    r.setDate(r.getDate()+n);
    return r;
  }
  function fmt(d) { return d.toISOString().split("T")[0]; }
  function formatDisplay(dateStr) {
    const [y,m,day] = dateStr.split("-").map(Number);
    return new Date(y,m-1,day).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  }
 
  // ── Init ──
  const urlParams = new URLSearchParams(window.location.search);
  const jumpDate  = urlParams.get("date");
  if (jumpDate) {
    const d = new Date(jumpDate + "T12:00:00");
    currentMonday = getMonday(d);
  }
  render();

  // ── Auto-refresh ──
  function reloadData() {
    deliveries     = JSON.parse(localStorage.getItem(DELIVERIES_KEY))  || {};
    blockedDays    = JSON.parse(localStorage.getItem(BLOCKED_KEY))     || {};
    cancelledSlots = JSON.parse(localStorage.getItem(CANCELLED_KEY))   || {};
    approvedSlots  = JSON.parse(localStorage.getItem(APPROVED_KEY))    || {};
    removedDeliveries = JSON.parse(localStorage.getItem(REMOVED_KEY)) || {};
    render();
  }

  // Auto-refresh every 5 seconds
  setInterval(reloadData, 5000);

  // Instantly refresh if data changes in another tab
  window.addEventListener("storage", reloadData);
</script>

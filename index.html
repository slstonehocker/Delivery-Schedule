<!DOCTYPE html>
<html lang="en">
<head>
  <title>Delivery Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Sheridan Delivery Schedule Calendar</h1>

  <div class="controls">
    <button onclick="changeWeek(-1)">Previous Week</button>
    <h2 id="weekTitle"></h2>
    <button onclick="changeWeek(1)">Next Week</button>
    <button onclick="goToToday()" id="todayBtn">Today</button>
  </div>

    <div class="search-bar">
  <input
    type="text"
    id="searchOrder"
    placeholder="Search Order Number"
  >

  <button onclick="searchOrder()">Search</button>

  <button onclick="clearSearch()">Clear</button>
</div>

    <div class="search-bar my-deliveries-bar">
  <input
    type="text"
        id="myDeliveriesName"
    placeholder="Enter your name to see your deliveries"
  >

  <button onclick="showMyDeliveries()">My Deliveries</button>
</div>

  
  <div id="myDeliveriesResults" class="my-deliveries hidden"></div>

  <div id="calendar"></div>
    

  <div id="popup" class="popup hidden">
    <div class="popup-box">
      <button class="popup-close" onclick="closePopup()">&times;</button>
            <h2 id="popupTitle">Add Delivery</h2>
      <p class="required-key"><span class="required-asterisk">*</span> = required field</p>

      <label>Salesperson Name <span class="required-asterisk">*</span></label>
      <input id="salespersonName" type="text">

      <label>Salesperson Email <span class="required-asterisk">*</span></label>
      <input id="salespersonEmail" type="text">

      <label>Confirm Salesperson Email <span class="required-asterisk">*</span></label>
      <input id="salespersonEmailConfirm" type="text">

      <label>Order Number <span class="required-asterisk">*</span></label>
      <input id="orderNumber" type="text" placeholder="S0000000" maxlength="8">

      <label>Onsite Contact <span class="required-asterisk">*</span></label>
      <input id="onsiteContact" type="text">

      <label>Onsite Contact Phone Number <span class="required-asterisk">*</span></label>
      <input id="phoneNumber" type="text">


      <label>Preferred Time <span class="required-asterisk">*</span></label>
      <select id="preferredTime">
        <option value="" disabled selected>Please select a preferred time</option>
        <option value="Early Morning">Early Morning</option>
        <option value="Late Morning">Late Morning</option>
        <option value="Early Afternoon">Early Afternoon</option>
        <option value="Late Afternoon">Late Afternoon</option>
      </select>

      <label>Address (optional)</label>
      <textarea id="address"></textarea>
        
   <label>Delivery Notes</label>
   <textarea id="deliveryNotes"></textarea>

      <div class="buttons">
        <button onclick="enableEdit()" id="editBtn">Edit</button>
        <button onclick="saveDelivery()" id="saveBtn">Save</button>
        <button onclick="deleteDelivery()" id="deleteBtn">Delete</button>
        <button onclick="closePopup()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="saveSuccess" class="toast hidden">
    ✓ Delivery saved! Approval request sent to manager.
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init("G01hd-w3QqqqF_QWl");</script>
  <script src="app.js"></script>
</body>
</html>
